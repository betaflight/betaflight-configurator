<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Betaflight downloads</title>
        <meta name="description" content="Download Betaflight Configurator nightly builds, stable releases, and the web app." />
        <link rel="icon" type="image/png" href="favicon.png" />
        <style>
            :root {
                --primary-500: #ffbb00;
                --primary-700: #bb6502;
                --surface-50: #000000;
                --surface-100: #0a0a0a;
                --surface-200: #141414;
                --surface-300: #1f1f1f;
                --surface-400: #2a2a2a;
                --surface-500: #404040;
                --surface-700: #6b6b6b;
                --text: hsl(0, 0%, 95%);
                --text-dim: hsl(0, 0%, 65%);
                --link: var(--primary-500);
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                background: var(--surface-100);
                color: var(--text);
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                font-size: 16px;
                line-height: 1.5;
            }

            a {
                color: var(--link);
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }

            header {
                background: var(--surface-200);
                border-bottom: 1px solid var(--surface-400);
                padding: 1.5rem 2rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            header img {
                height: 40px;
            }
            header h1 {
                font-size: 1.5rem;
                margin: 0;
                color: var(--primary-500);
            }

            main {
                max-width: 960px;
                margin: 0 auto;
                padding: 2rem 1.5rem 4rem;
            }

            section {
                margin-bottom: 3rem;
            }

            h2 {
                font-size: 1.25rem;
                color: var(--primary-500);
                border-bottom: 1px solid var(--surface-400);
                padding-bottom: 0.5rem;
                margin: 0 0 1rem;
            }

            h3 {
                font-size: 1rem;
                color: var(--text);
                margin: 1.25rem 0 0.5rem;
            }

            .meta {
                color: var(--text-dim);
                font-size: 0.875rem;
                margin: -0.5rem 0 1rem;
            }

            .card-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 0.75rem;
            }

            .card {
                background: var(--surface-200);
                border: 1px solid var(--surface-400);
                border-radius: 6px;
                padding: 1rem;
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
            }
            .card .label {
                font-weight: 600;
            }
            .card .sub {
                color: var(--text-dim);
                font-size: 0.875rem;
            }

            .download-btn {
                display: inline-block;
                margin-top: 0.5rem;
                padding: 0.4rem 0.9rem;
                background: var(--primary-500);
                color: #000;
                font-weight: 600;
                border-radius: 4px;
                text-align: center;
            }
            .download-btn:hover {
                text-decoration: none;
                background: #ffd03d;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 0.5rem;
            }
            th,
            td {
                text-align: left;
                padding: 0.5rem 0.75rem;
                border-bottom: 1px solid var(--surface-400);
                font-size: 0.9rem;
            }
            th {
                color: var(--text-dim);
                font-weight: 600;
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            td a {
                white-space: nowrap;
            }
            details {
                background: var(--surface-200);
                border: 1px solid var(--surface-400);
                border-radius: 6px;
                padding: 0.5rem 1rem;
                margin-bottom: 0.5rem;
            }
            details summary {
                cursor: pointer;
                font-weight: 600;
                padding: 0.25rem 0;
            }
            details summary .release-meta {
                color: var(--text-dim);
                font-weight: 400;
                margin-left: 0.5rem;
                font-size: 0.875rem;
            }
            details ul {
                list-style: none;
                padding: 0;
                margin: 0.5rem 0;
            }
            details li {
                padding: 0.25rem 0;
                font-size: 0.9rem;
            }

            footer {
                color: var(--text-dim);
                font-size: 0.85rem;
                text-align: center;
                padding: 2rem 1rem;
                border-top: 1px solid var(--surface-400);
            }

            .empty {
                color: var(--text-dim);
                font-style: italic;
            }
        </style>
    </head>
    <body>
        <header>
            <img src="logo.svg" alt="Betaflight" />
            <h1>Downloads</h1>
        </header>
        <main>
            <!--SECTIONS-->
        </main>
        <footer>
            Generated <!--GENERATED_AT-->. Source:
            <a href="https://github.com/betaflight/betaflight-configurator">betaflight/betaflight-configurator</a>.
        </footer>
    </body>
</html>
